# Temporal Reasoning — Codex CLI configuration
# Merge into ~/.codex/config.toml or codex.toml in your project root.
# Replace PATH_TO_REPO and PATH_TO_PROJECT with absolute paths.

[mcp_servers."temporal-reasoning"]
command = ["python", "PATH_TO_REPO/mcp_server.py"]

[mcp_servers."temporal-reasoning".env]
MINIGRAF_GRAPH_PATH = "PATH_TO_PROJECT/memory.graph"
VULCAN_EXTRACTION_STRATEGY = "heuristic"

# Auto-memory hooks — uncomment if your Codex version supports pre/post-turn hooks:
# [hooks.pre_turn]
# command = ["python", "PATH_TO_REPO/hooks/prepare_hook.py"]
# timeout_ms = 5000
#
# [hooks.post_turn]
# command = ["python", "PATH_TO_REPO/hooks/finalize_hook.py"]
# timeout_ms = 10000
